<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" fill="none">
  <!-- Back roof (largest, lightest) -->
  <path d="M80 145 L200 55 L320 145" fill="none" stroke="#7ec8e3" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M80 145 L200 55 L320 145 L295 145 L200 72 L105 145 Z" fill="#bde0f0" opacity="0.4"/>

  <!-- Middle roof -->
  <path d="M55 155 L175 65 L295 155" fill="none" stroke="#4aa8d8" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M55 155 L175 65 L295 155 L270 155 L175 82 L80 155 Z" fill="#8fc9e3" opacity="0.45"/>

  <!-- Front roof (smallest, darkest) with house walls -->
  <path d="M100 160 L195 80 L290 160" fill="none" stroke="#1a6fa0" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M100 160 L195 80 L290 160 Z" fill="#2488be" opacity="0.35"/>

  <!-- House walls -->
  <rect x="125" y="155" width="140" height="5" fill="#1a6fa0" opacity="0.2"/>

  <!-- Chimney on back roof -->
  <rect x="245" y="80" width="18" height="35" fill="#4aa8d8" rx="2"/>
  <rect x="242" y="76" width="24" height="8" fill="#3a98c8" rx="2"/>

  <!-- Pressure washer wand (coming from left) -->
  <line x1="30" y1="95" x2="105" y2="95" stroke="#1a6fa0" stroke-width="4" stroke-linecap="round"/>
  <line x1="105" y1="95" x2="130" y2="80" stroke="#1a6fa0" stroke-width="4" stroke-linecap="round"/>
  <!-- Wand nozzle -->
  <circle cx="130" cy="78" r="4" fill="#1a6fa0"/>

  <!-- Water spray lines from nozzle -->
  <line x1="134" y1="75" x2="152" y2="65" stroke="#4aa8d8" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="135" y1="78" x2="155" y2="73" stroke="#4aa8d8" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="134" y1="81" x2="153" y2="82" stroke="#4aa8d8" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Water droplets -->
  <circle cx="158" cy="63" r="2.5" fill="#4aa8d8" opacity="0.6"/>
  <circle cx="162" cy="72" r="2" fill="#4aa8d8" opacity="0.5"/>
  <circle cx="160" cy="80" r="1.8" fill="#4aa8d8" opacity="0.4"/>

  <!-- Sparkle top-right (4-point star) -->
  <g transform="translate(300, 60)">
    <path d="M0 -12 L3 -3 L12 0 L3 3 L0 12 L-3 3 L-12 0 L-3 -3 Z" fill="#1a6fa0"/>
  </g>

  <!-- Sparkle small top-center -->
  <g transform="translate(215, 42)">
    <path d="M0 -7 L2 -2 L7 0 L2 2 L0 7 L-2 2 L-7 0 L-2 -2 Z" fill="#4aa8d8" opacity="0.8"/>
  </g>

  <!-- Sparkle small right -->
  <g transform="translate(320, 110)">
    <path d="M0 -6 L1.5 -1.5 L6 0 L1.5 1.5 L0 6 L-1.5 1.5 L-6 0 L-1.5 -1.5 Z" fill="#4aa8d8" opacity="0.6"/>
  </g>

  <!-- Sparkle dot accents -->
  <circle cx="285" cy="52" r="2.5" fill="#1a6fa0" opacity="0.5"/>
  <circle cx="330" cy="85" r="2" fill="#4aa8d8" opacity="0.4"/>
  <circle cx="55" cy="80" r="2" fill="#4aa8d8" opacity="0.4"/>

  <!-- Brand text: Cleanz ATX -->
  <text x="195" y="210" font-family="'Plus Jakarta Sans', 'Inter', Arial, sans-serif" font-size="48" font-weight="800" fill="#0f2a44" text-anchor="middle" letter-spacing="-1">Cleanz ATX</text>

  <!-- Tagline: Exterior Cleaning Experts -->
  <text x="195" y="235" font-family="'Inter', Arial, sans-serif" font-size="15" font-weight="500" fill="#3aafe0" text-anchor="middle" letter-spacing="2.5">Exterior Cleaning Experts</text>
</svg>
